<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="WindowSense preview">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1a2e" />
      <stop offset="100%" stop-color="#0f3460" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#a)" />
  <!-- Window frame -->
  <rect x="120" y="80" width="500" height="420" rx="12" fill="#1a2744" stroke="#2563eb" stroke-width="2" />
  <rect x="140" y="100" width="460" height="380" rx="6" fill="#0f172a" />
  <!-- Window panes -->
  <rect x="150" y="110" width="220" height="180" rx="4" fill="#1e3a5f" opacity="0.7" />
  <rect x="380" y="110" width="210" height="180" rx="4" fill="#1e3a5f" opacity="0.5" />
  <rect x="150" y="300" width="220" height="170" rx="4" fill="#1e3a5f" opacity="0.5" />
  <rect x="380" y="300" width="210" height="170" rx="4" fill="#1e3a5f" opacity="0.3" />
  <!-- Sensor indicators -->
  <circle cx="780" cy="150" r="40" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2" />
  <text x="780" y="158" font-family="sans-serif" font-size="14" fill="#38bdf8" text-anchor="middle">TEMP</text>
  <circle cx="900" cy="150" r="40" fill="#1e3a5f" stroke="#34d399" stroke-width="2" />
  <text x="900" y="158" font-family="sans-serif" font-size="14" fill="#34d399" text-anchor="middle">HUM</text>
  <circle cx="1020" cy="150" r="40" fill="#1e3a5f" stroke="#f59e0b" stroke-width="2" />
  <text x="1020" y="158" font-family="sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">RAIN</text>
  <!-- Phone -->
  <rect x="740" y="230" width="140" height="240" rx="20" fill="#1e293b" />
  <rect x="752" y="248" width="116" height="204" rx="12" fill="#0f172a" />
  <rect x="765" y="262" width="90" height="14" rx="3" fill="#38bdf8" />
  <rect x="765" y="285" width="60" height="10" rx="3" fill="#475569" />
  <rect x="765" y="306" width="90" height="40" rx="6" fill="#1e3a5f" />
  <rect x="765" y="356" width="90" height="40" rx="6" fill="#1e3a5f" />
  <rect x="765" y="406" width="90" height="30" rx="6" fill="#0f3460" />
  <!-- Label -->
  <text x="120" y="560" font-family="sans-serif" font-size="32" font-weight="bold" fill="#f8fafc">WindowSense</text>
  <text x="120" y="600" font-family="sans-serif" font-size="18" fill="#94a3b8">Smart IoT Window System</text>
